<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLN College of Engineering - Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e40af,#2563eb);
}

.container{
    width:100%;
    text-align:center;
    padding:20px;
}

.logo{
    width:110px;
    height:110px;
    border-radius:50%;
    background:white;
    padding:8px;
    box-shadow:0 8px 20px rgba(0,0,0,.3);
    margin-bottom:15px;
}

h1{
    color:white;
    font-size:32px;
    letter-spacing:1px;
    margin-bottom:35px;
}

.login-box{
    width:380px;
    max-width:95%;
    margin:auto;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:35px;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
}

.user-icon{
    font-size:70px;
    color:white;
    margin-bottom:10px;
}

.login-box h2{
    color:white;
    margin-bottom:5px;
}

.login-box p{
    color:#dddddd;
    margin-bottom:25px;
}

.input-box{
    display:flex;
    align-items:center;
    background:white;
    border-radius:10px;
    margin-bottom:18px;
    padding:12px;
}

.input-box i{
    color:#555;
    font-size:18px;
}

.input-box input{
    width:100%;
    border:none;
    outline:none;
    margin-left:10px;
    font-size:15px;
}

.input-box span{
    cursor:pointer;
}

button{
    width:100%;
    padding:13px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#1d4ed8;
}

.footer{
    color:white;
    margin-top:25px;
    font-size:14px;
}

</style>

</head>
<body>

<div class="container">

    <!-- College Logo -->
    <img src="D:/Rich dad poor dad/klnce.png" class="logo" alt="KLNCE Logo">

    <!-- College Name -->
    <h1>KLN COLLEGE OF ENGINEERING</h1>

    <!-- Login Card -->
    <div class="login-box">

        <div class="user-icon">
            <i class="bi bi-person-circle"></i>
        </div>

        <h2>Welcome</h2>

        <p>Please login to continue</p>

        <form>

            <div class="input-box">
                <i class="bi bi-person-fill"></i>
                <input type="text" placeholder="Username" required>
            </div>

            <div class="input-box">
                <i class="bi bi-lock-fill"></i>

                <input id="password" type="password" placeholder="Password" required>

                <span onclick="togglePassword()">
                    <i id="eye" class="bi bi-eye-fill"></i>
                </span>

            </div>

            <button type="submit">Login</button>

        </form>

    </div>

    <div class="footer">
        © 2026 KLN College of Engineering
    </div>

</div>

<script>

function togglePassword(){

    let password=document.getElementById("password");
    let eye=document.getElementById("eye");

    if(password.type==="password"){
        password.type="text";
        eye.className="bi bi-eye-slash-fill";
    }else{
        password.type="password";
        eye.className="bi bi-eye-fill";
    }

}

</script>

</body>
</html>
